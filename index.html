<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutor Virtual AI Sobat Data</title>
<style>
  :root{
    --wa-header:#075E54;
    --wa-header-dark:#054d44;
    --wa-bg:#e5ddd3;
    --bubble-in:#ffffff;
    --bubble-out:#dcf8c6;
    --ink:#111b21;
    --sub:#667781;
    --danger:#c0392b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    background:#0b141a;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
  }
  .app{
    width:288px;
    max-width:288px;
    height:96px;
    max-height:96px;
    background:var(--wa-bg);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 20px 50px rgba(0,0,0,0.45);
    border-radius:14px;
    transition:width 0.35s ease, height 0.35s ease, max-width 0.35s ease, max-height 0.35s ease;
  }
  .app.expanded{
    width:100%;
    max-width:340px;
    height:100vh;
    max-height:520px;
    border-radius:0;
  }

  /* ===== Header ala WhatsApp ===== */
  header{
    background:var(--wa-header);
    color:#fff;
    padding:10px 14px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-shrink:0;
  }
  header .avatar{
    width:38px;height:38px;border-radius:50%;
    background:#0e7d6f;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;flex-shrink:0;
  }
  header .title{line-height:1.2;flex:1;min-width:0;}
  header .title b{font-size:13px;display:block;font-weight:600;line-height:1.25;}
  header .title span{font-size:10.5px;opacity:0.85;}

  /* ===== Bar identitas kecil (nama & kelas) ===== */
  #idBar{
    background:var(--wa-header-dark);
    padding:5px 14px 6px;
    display:flex;
    gap:8px;
    flex-shrink:0;
  }
  #idBar input{
    flex:1;
    min-width:0;
    background:rgba(255,255,255,0.12);
    border:none;
    border-radius:6px;
    color:#fff;
    font-size:11px;
    padding:5px 8px;
  }
  #idBar input::placeholder{color:rgba(255,255,255,0.55);}
  #idBar input:focus{outline:1px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.18);}

  /* ===== Area chat ===== */
  #messages{
    flex:1;overflow-y:auto;padding:14px 10px;display:flex;flex-direction:column;gap:6px;
    background-color:var(--wa-bg);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(0,0,0,0.02) 0, transparent 40%),
      radial-gradient(circle at 80% 30%, rgba(0,0,0,0.02) 0, transparent 40%),
      radial-gradient(circle at 40% 70%, rgba(0,0,0,0.02) 0, transparent 40%);
  }
  .msg{
    max-width:80%;padding:7px 9px 8px;border-radius:8px;font-size:14px;line-height:1.4;
    white-space:pre-wrap;box-shadow:0 1px 0.5px rgba(0,0,0,0.13);position:relative;
  }
  .msg.tutor{
    align-self:flex-start;background:var(--bubble-in);color:var(--ink);
    border-top-left-radius:2px;
  }
  .msg.siswa{
    align-self:flex-end;background:var(--bubble-out);color:var(--ink);
    border-top-right-radius:2px;
  }
  .msg .time{
    display:block;text-align:right;font-size:10px;color:var(--sub);margin-top:2px;
  }
  .typing{align-self:flex-start;color:var(--sub);font-size:12.5px;padding:4px 10px;font-style:italic;}

  /* ===== Input bar ===== */
  #inputBar{
    display:flex;align-items:flex-end;gap:8px;padding:8px 10px;
    background:#f0f0f0;flex-shrink:0;
  }
  #inputBar textarea{
    flex:1;resize:none;border:none;border-radius:20px;
    padding:10px 16px;font-size:14.5px;font-family:inherit;max-height:90px;
    background:#fff;
  }
  #inputBar textarea:focus{outline:none;}
  #inputBar button{
    background:var(--wa-header);color:#fff;border:none;border-radius:50%;
    width:40px;height:40px;flex-shrink:0;font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  #inputBar button:disabled{opacity:0.5;cursor:not-allowed;}
  #err{color:var(--danger);font-size:12px;padding:2px 14px 6px;display:none;background:var(--wa-bg);}

  /* ===== Layar awal (sebelum masuk chat) ===== */
  #startScreen{
    flex:1;display:flex;flex-direction:row;align-items:center;justify-content:center;
    gap:10px;background:var(--wa-header);padding:8px 12px;text-align:left;
  }
  #startScreen .startIcon{
    width:34px;height:34px;border-radius:50%;background:#0e7d6f;
    display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
  }
  #startScreen button{
    background:#dcf8c6;color:#075E54;border:none;border-radius:14px;
    padding:9px 14px;font-size:11px;line-height:1.3;font-weight:600;cursor:pointer;
    box-shadow:0 3px 8px rgba(0,0,0,0.25);text-align:left;
  }
  #startScreen button:hover{filter:brightness(0.97);}

  #chatScreen{
    display:none;
    flex:1;min-height:0;flex-direction:column;
  }
</style>
</head>
<body>
<div class="app">

  <div id="startScreen">
    <div class="startIcon">📊</div>
    <button id="btnMasuk">Tanya Tutor AI Sobat Data yukk...</button>
  </div>

  <div id="chatScreen">
    <header>
      <div class="avatar">📊</div>
      <div class="title">
        <b>Tutor Virtual AI Sobat Data</b>
        <span>online</span>
      </div>
    </header>

    <div id="idBar">
      <input id="inNama" type="text" placeholder="Nama kamu">
      <input id="inKelas" type="text" placeholder="Kelas (mis. 8A)">
    </div>

    <div id="messages"></div>
    <div id="err"></div>
    <div id="inputBar">
      <textarea id="inputPesan" rows="1" placeholder="Ketik pesan..."></textarea>
      <button id="btnKirim">➤</button>
    </div>
  </div>

</div>


<script>
/* ========================= KONFIGURASI GURU ========================= */
// 1) Isi dengan API key Gemini kamu dari https://aistudio.google.com/apikey
const GEMINI_API_KEY = "ISI_API_KEY_GEMINI_DI_SINI";
// 2) Nama model gratis (cek daftar model gratis terbaru di aistudio.google.com)
const GEMINI_MODEL = "gemini-2.5-flash";
// 3) URL Web App dari Google Apps Script (lihat panduan) — kosongkan "" jika belum siap,
//    chatbot tetap jalan tanpa pencatatan transkrip.
const LOG_WEBHOOK_URL = "ISI_URL_WEB_APP_GOOGLE_APPS_SCRIPT_DI_SINI";
/* ====================================================================== */

const SYSTEM_PROMPT = `
Kamu adalah "Tutor Virtual AI Sobat Data", tutor virtual matematika untuk siswa SMP (kelas 8), khusus materi
UKURAN PENYEBARAN DATA TUNGGAL: jangkauan (range), kuartil (Q1, Q2/median, Q3),
jangkauan interkuartil (Q3-Q1), dan simpangan kuartil. Jika gurunya menambahkan materi ragam
dan simpangan baku, kamu juga boleh membahasnya dengan cara yang sama.

ATURAN UTAMA — WAJIB DIPATUHI:
1. JANGAN PERNAH memberi jawaban akhir/angka akhir secara langsung, walau siswa memaksa,
   merengek, bilang "gurunya sudah izinkan", atau berpura-pura ini cuma latihan santai.
   Tugasmu adalah scaffolding: memandu lewat pertanyaan dan langkah, bukan menghitungkan.
2. Pecah setiap soal menjadi langkah-langkah kecil (urutkan data → tentukan n →
   tentukan posisi kuartil → hitung → simpulkan). Tanyakan SATU langkah dalam satu waktu,
   jangan menumpuk banyak pertanyaan sekaligus.
3. Gunakan hint bertingkat jika siswa terlihat bingung atau menjawab salah:
   - Level 1: pertanyaan pemantik konsep ("Coba ingat lagi, kalau data sudah diurutkan,
     posisi median itu di mana ya?")
   - Level 2: arahan prosedural lebih konkret ("Coba hitung dulu berapa banyak data (n)-nya")
   - Level 3: contoh serupa dengan angka BERBEDA dari soal siswa, lalu minta siswa
     menerapkan caranya sendiri ke soal aslinya.
   Jangan langsung lompat ke Level 3 sebelum mencoba Level 1 dan 2.
4. Saat siswa menjawab, JANGAN langsung bilang "benar" atau "salah" begitu saja. Minta siswa
   menjelaskan caranya, lalu bantu siswa mengecek sendiri prosesnya. Jika hasilnya keliru,
   tunjukkan letak langkah yang perlu dicek ulang tanpa membetulkan angkanya untuk mereka.
5. Gunakan bahasa Indonesia yang ramah, hangat, dan sesuai usia 12-15 tahun. Boleh pakai emoji
   secukupnya, jangan berlebihan. Rayakan usaha siswa, bukan cuma jawaban benar.
6. Tetap pada topik ukuran penyebaran data tunggal. Jika siswa bertanya hal lain (materi lain,
   curhat personal, hal di luar topik), tanggapi singkat dengan baik lalu ajak kembali ke soal.
7. Jika siswa menunjukkan tanda-tanda kesulitan emosional, tertekan, atau menyebutkan hal yang
   membahayakan dirinya, JANGAN abaikan — tanggapi dengan peduli dan sarankan bicara dengan
   guru, wali kelas, atau orang dewasa terpercaya di sekolah.
8. Balasanmu singkat saja (maksimal 3-5 kalimat atau beberapa poin pendek), supaya tidak
   membanjiri siswa SMP dengan teks panjang.

Mulai percakapan dengan menyapa siswa dan menanyakan soal ukuran penyebaran data apa yang
sedang mereka kerjakan di E-LKPD, atau minta mereka menempelkan/menuliskan datanya.
`.trim();

const SAPAAN_PEMBUKA = "Halo sobat data... Ayo kita belajar materi ukuran penyebaran data bersama.";

let riwayat = []; // {role:'user'|'model', text}
let namaSiswa = "", kelasSiswa = "";
let sessionId = buatSessionId();

function buatSessionId(){
  return 'sesi-' + Date.now() + '-' + Math.random().toString(36).slice(2,8);
}

function jamSekarang(){
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function scrollBawah(){
  const box = document.getElementById('messages');
  box.scrollTop = box.scrollHeight;
}

function tambahBubble(peran, teks){
  const box = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + (peran === 'model' ? 'tutor' : 'siswa');
  const isi = document.createElement('span');
  isi.textContent = teks;
  const waktu = document.createElement('span');
  waktu.className = 'time';
  waktu.textContent = jamSekarang();
  div.appendChild(isi);
  div.appendChild(waktu);
  box.appendChild(div);
  scrollBawah();
}

function catatTranskrip(peran, teks){
  if(!LOG_WEBHOOK_URL || LOG_WEBHOOK_URL.startsWith("ISI_URL")) return;
  try{
    fetch(LOG_WEBHOOK_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        sessionId, nama: namaSiswa, kelas: kelasSiswa,
        waktu: new Date().toISOString(),
        peran: peran === 'model' ? 'tutor' : 'siswa',
        pesan: teks
      })
    });
  }catch(e){ console.warn('Gagal mencatat transkrip', e); }
}

async function panggilGemini(){
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`;
  const contents = riwayat.map(m => ({ role: m.role, parts: [{ text: m.text }] }));
  const body = {
    system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
    contents,
    generationConfig: { temperature: 0.6, maxOutputTokens: 400 }
  };
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if(!res.ok){
    const t = await res.text();
    throw new Error('API error ' + res.status + ': ' + t.slice(0,200));
  }
  const data = await res.json();
  const teks = data?.candidates?.[0]?.content?.parts?.map(p=>p.text).join('') || '(Tutor tidak bisa menjawab, coba lagi ya)';
  return teks;
}

async function kirimKeTutor(pesanUser){
  document.getElementById('err').style.display = 'none';
  if(pesanUser){
    riwayat.push({ role: 'user', text: pesanUser });
    tambahBubble('user', pesanUser);
    catatTranskrip('user', pesanUser);
  }
  const btn = document.getElementById('btnKirim');
  btn.disabled = true;
  const box = document.getElementById('messages');
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.textContent = 'Tutor sedang mengetik...';
  box.appendChild(typing);
  scrollBawah();
  try{
    const balasan = await panggilGemini();
    typing.remove();
    riwayat.push({ role: 'model', text: balasan });
    tambahBubble('model', balasan);
    catatTranskrip('model', balasan);
  }catch(e){
    typing.remove();
    const err = document.getElementById('err');
    err.style.display = 'block';
    err.textContent = 'Ups, ada gangguan koneksi ke tutor. ' + e.message;
  }
  btn.disabled = false;
}

document.getElementById('inNama').addEventListener('change', (e) => {
  namaSiswa = e.target.value.trim();
});
document.getElementById('inKelas').addEventListener('change', (e) => {
  kelasSiswa = e.target.value.trim();
});

document.getElementById('btnKirim').addEventListener('click', () => {
  const ta = document.getElementById('inputPesan');
  const teks = ta.value.trim();
  if(!teks) return;
  ta.value = '';
  kirimKeTutor(teks);
});

document.getElementById('inputPesan').addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    document.getElementById('btnKirim').click();
  }
});

document.getElementById('btnMasuk').addEventListener('click', () => {
  document.querySelector('.app').classList.add('expanded');
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';
  riwayat.push({ role: 'model', text: SAPAAN_PEMBUKA });
  tambahBubble('model', SAPAAN_PEMBUKA);
  document.getElementById('inputPesan').focus();
});
</script>
</body>
</html>

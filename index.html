<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutor Virtual AI Sobat Data</title>
<style>
  :root{
    --wa-header:#075E54;
    --wa-header-dark:#054d44;
    --wa-bg:#e5ddd3;
    --bubble-in:#ffffff;
    --bubble-out:#dcf8c6;
    --ink:#111b21;
    --sub:#667781;
    --danger:#c0392b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    background:transparent;
    display:flex;
    align-items:flex-start;
    justify-content:flex-start;
    min-height:auto;
  }
  .app{
    width:288px;
    max-width:288px;
    height:96px;
    max-height:96px;
    background:var(--wa-bg);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 4px 14px rgba(0,0,0,0.18);
    border-radius:14px;
    transition:width 0.35s ease, height 0.35s ease, max-width 0.35s ease, max-height 0.35s ease;
  }
  .app.expanded{
    width:100%;
    max-width:340px;
    height:100vh;
    max-height:520px;
    border-radius:0;
  }

  /* ===== Header ala WhatsApp ===== */
  header{
    background:var(--wa-header);
    color:#fff;
    padding:10px 14px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-shrink:0;
  }
  header .avatar{
    width:38px;height:38px;border-radius:50%;
    background:#0e7d6f;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;flex-shrink:0;
  }
  header .title{line-height:1.2;flex:1;min-width:0;}
  header .title b{font-size:13px;display:block;font-weight:600;line-height:1.25;}
  header .title span{font-size:10.5px;opacity:0.85;}

  /* ===== Bar identitas kecil (nama & kelas) ===== */
  #idBar{
    background:var(--wa-header-dark);
    padding:5px 14px 6px;
    display:flex;
    gap:8px;
    flex-shrink:0;
  }
  #idBar input{
    flex:1;
    min-width:0;
    background:rgba(255,255,255,0.12);
    border:none;
    border-radius:6px;
    color:#fff;
    font-size:11px;
    padding:5px 8px;
  }
  #idBar input::placeholder{color:rgba(255,255,255,0.55);}
  #idBar input:focus{outline:1px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.18);}

  /* ===== Area chat ===== */
  #messages{
    flex:1;overflow-y:auto;padding:14px 10px;display:flex;flex-direction:column;gap:6px;
    background-color:var(--wa-bg);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(0,0,0,0.02) 0, transparent 40%),
      radial-gradient(circle at 80% 30%, rgba(0,0,0,0.02) 0, transparent 40%),
      radial-gradient(circle at 40% 70%, rgba(0,0,0,0.02) 0, transparent 40%);
  }
  .msg{
    max-width:80%;padding:7px 9px 8px;border-radius:8px;font-size:14px;line-height:1.4;
    white-space:pre-wrap;box-shadow:0 1px 0.5px rgba(0,0,0,0.13);position:relative;
  }
  .msg.tutor{
    align-self:flex-start;background:var(--bubble-in);color:var(--ink);
    border-top-left-radius:2px;
  }
  .msg.siswa{
    align-self:flex-end;background:var(--bubble-out);color:var(--ink);
    border-top-right-radius:2px;
  }
  .msg .time{
    display:block;text-align:right;font-size:10px;color:var(--sub);margin-top:2px;
  }
  .typing{align-self:flex-start;color:var(--sub);font-size:12.5px;padding:4px 10px;font-style:italic;}

  /* ===== Input bar ===== */
  #inputBar{
    display:flex;align-items:flex-end;gap:8px;padding:8px 10px;
    background:#f0f0f0;flex-shrink:0;
  }
  #inputBar textarea{
    flex:1;resize:none;border:none;border-radius:20px;
    padding:10px 16px;font-size:14.5px;font-family:inherit;max-height:90px;
    background:#fff;
  }
  #inputBar textarea:focus{outline:none;}
  #inputBar button{
    background:var(--wa-header);color:#fff;border:none;border-radius:50%;
    width:40px;height:40px;flex-shrink:0;font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  #inputBar button:disabled{opacity:0.5;cursor:not-allowed;}
  #err{color:var(--danger);font-size:12px;padding:2px 14px 6px;display:none;background:var(--wa-bg);}

  /* ===== Layar awal (sebelum masuk chat) ===== */
  #startScreen{
    flex:1;display:flex;flex-direction:row;align-items:center;justify-content:center;
    gap:10px;background:var(--wa-header);padding:8px 12px;text-align:left;
  }
  #startScreen .startIcon{
    width:34px;height:34px;border-radius:50%;background:#0e7d6f;
    display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
  }
  #startScreen button{
    background:#dcf8c6;color:#075E54;border:none;border-radius:14px;
    padding:9px 14px;font-size:11px;line-height:1.3;font-weight:600;cursor:pointer;
    box-shadow:0 3px 8px rgba(0,0,0,0.25);text-align:left;
  }
  #startScreen button:hover{filter:brightness(0.97);}

  #chatScreen{
    display:none;
    flex:1;min-height:0;flex-direction:column;
  }
</style>
</head>
<body>
<div class="app">

  <div id="startScreen">
    <div class="startIcon">📊</div>
    <button id="btnMasuk">Tanya Tutor AI Sobat Data yukk...</button>
  </div>

  <div id="chatScreen">
    <header>
      <div class="avatar">📊</div>
      <div class="title">
        <b>Tutor Virtual AI Sobat Data</b>
        <span>online</span>
      </div>
    </header>

    <div id="idBar">
      <input id="inNama" type="text" placeholder="Nama kamu">
      <input id="inKelas" type="text" placeholder="Kelas (mis. 8A)">
    </div>

    <div id="messages"></div>
    <div id="err"></div>
    <div id="inputBar">
      <textarea id="inputPesan" rows="1" placeholder="Ketik pesan..."></textarea>
      <button id="btnKirim">➤</button>
    </div>
  </div>

</div>


<script>
/* ========================= KONFIGURASI GURU ========================= */
// 1) URL Web App dari Google Apps Script.
// API key Groq TIDAK disimpan di sini — sudah dipindah ke Apps Script
// (lihat file CatatTranskrip.gs) supaya tidak bisa bocor lewat GitHub publik.
const BACKEND_URL = "https://script.google.com/macros/s/AKfycby1XBIZdttbzCOuk6svM4vziUtcKpPXuQGMA0YUCuVyhl4L4rCGEO81iX3RskXH075zUw/exec";
// 2) Token rahasia — HARUS SAMA PERSIS dengan SECRET_TOKEN yang Anda simpan
//    di Script Properties Apps Script. Ini bukan pengaman sempurna (tetap
//    terlihat kalau ada yang membuka kode sumber halaman ini), tapi cukup
//    untuk mencegah penyalahgunaan tidak sengaja/otomatis lewat URL saja.
const APP_TOKEN = "Sobatdata12345";
/* ====================================================================== */

// Catatan: SYSTEM_PROMPT (aturan scaffolding tutor) sekarang ada di server
// (file CatatTranskrip.gs), bukan di sini lagi — supaya konsisten dengan
// arsitektur baru yang tidak menyimpan rahasia apa pun di kode publik ini.

const SAPAAN_PEMBUKA = "Halo sobat data... Ayo kita belajar materi ukuran penyebaran data bersama.";

let riwayat = []; // {role:'user'|'model', text}
let namaSiswa = "", kelasSiswa = "";
let sessionId = buatSessionId();

function buatSessionId(){
  return 'sesi-' + Date.now() + '-' + Math.random().toString(36).slice(2,8);
}

function jamSekarang(){
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function scrollBawah(){
  const box = document.getElementById('messages');
  box.scrollTop = box.scrollHeight;
}

function tambahBubble(peran, teks){
  const box = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + (peran === 'model' ? 'tutor' : 'siswa');
  const isi = document.createElement('span');
  isi.textContent = teks;
  const waktu = document.createElement('span');
  waktu.className = 'time';
  waktu.textContent = jamSekarang();
  div.appendChild(isi);
  div.appendChild(waktu);
  box.appendChild(div);
  scrollBawah();
}

function tunda(ms){ return new Promise(r => setTimeout(r, ms)); }

async function panggilBackend(onRetryInfo){
  const MAX_PERCOBAAN = 4;
  let percobaan = 0;
  let terakhirError = null;

  while(percobaan < MAX_PERCOBAAN){
    try{
      const res = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' }, // hindari CORS preflight ke Apps Script
        body: JSON.stringify({
          aksi: 'chat',
          token: APP_TOKEN,
          riwayat,
          nama: namaSiswa,
          kelas: kelasSiswa,
          sessionId
        })
      });

      const data = await res.json();

      if(data.status === 'ok'){
        return data.balasan || '(Tutor tidak bisa menjawab, coba lagi ya)';
      }

      // Error 429/503 dari Groq (diteruskan lewat backend) bersifat sementara -> layak dicoba ulang
      const bolehRetry = (data.code === 503 || data.code === 429);
      terakhirError = new Error(data.message || 'Gagal menghubungi tutor');
      if(!bolehRetry) throw terakhirError;

    }catch(e){
      terakhirError = e;
    }

    percobaan++;
    if(percobaan < MAX_PERCOBAAN){
      const jeda = 1000 * Math.pow(2, percobaan - 1); // 1s, 2s, 4s
      if(onRetryInfo) onRetryInfo(percobaan, MAX_PERCOBAAN);
      await tunda(jeda);
    }
  }

  throw terakhirError;
}

async function kirimKeTutor(pesanUser){
  document.getElementById('err').style.display = 'none';
  if(pesanUser){
    riwayat.push({ role: 'user', text: pesanUser });
    tambahBubble('user', pesanUser);
  }
  const btn = document.getElementById('btnKirim');
  btn.disabled = true;
  const box = document.getElementById('messages');
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.textContent = 'Tutor sedang mengetik...';
  box.appendChild(typing);
  scrollBawah();
  try{
    const balasan = await panggilBackend((percobaan, maks) => {
      typing.textContent = `Server AI sedang sibuk, mencoba lagi... (${percobaan}/${maks - 1})`;
    });
    typing.remove();
    riwayat.push({ role: 'model', text: balasan });
    tambahBubble('model', balasan);
  }catch(e){
    typing.remove();
    const err = document.getElementById('err');
    err.style.display = 'block';
    const pesanTeknis = e.message || '';
    if(pesanTeknis.includes('503') || pesanTeknis.includes('429')){
      err.textContent = 'Server AI sedang sangat sibuk. Coba kirim ulang pesanmu dalam beberapa saat ya 🙏';
    } else {
      err.textContent = 'Ups, ada gangguan koneksi ke tutor. ' + pesanTeknis;
    }
  }
  btn.disabled = false;
}

document.getElementById('inNama').addEventListener('change', (e) => {
  namaSiswa = e.target.value.trim();
});
document.getElementById('inKelas').addEventListener('change', (e) => {
  kelasSiswa = e.target.value.trim();
});

document.getElementById('btnKirim').addEventListener('click', () => {
  const ta = document.getElementById('inputPesan');
  const teks = ta.value.trim();
  if(!teks) return;
  ta.value = '';
  kirimKeTutor(teks);
});

document.getElementById('inputPesan').addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    document.getElementById('btnKirim').click();
  }
});

document.getElementById('btnMasuk').addEventListener('click', () => {
  document.querySelector('.app').classList.add('expanded');
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';
  riwayat.push({ role: 'model', text: SAPAAN_PEMBUKA });
  tambahBubble('model', SAPAAN_PEMBUKA);
  document.getElementById('inputPesan').focus();
});
</script>
</body>
</html>
